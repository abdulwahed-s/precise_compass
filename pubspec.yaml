name: precise_compass
description: >-
  Honest, high-accuracy Flutter compass: continuous heading accuracy in degrees,
  confidence scoring, sensor fusion, and reliable calibration detection.
version: 0.1.0
repository: https://github.com/abdulwahed-s/precise_compass
homepage: https://github.com/abdulwahed-s/precise_compass
issue_tracker: https://github.com/abdulwahed-s/precise_compass/issues
topics:
  - compass
  - sensors
  - heading
  - navigation
  - location
screenshots:
  - description: "Live heading with continuous accuracy (degrees) and a confidence meter."
    path: screenshots/compass.png
  - description: "Per-device capability readout and configuration (reference, rate, fusion)."
    path: screenshots/capabilities.png

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  plugin:
    platforms:
      android:
        package: com.precisecompass.precise_compass
        pluginClass: PreciseCompassPlugin
      ios:
        pluginClass: PreciseCompassPlugin
