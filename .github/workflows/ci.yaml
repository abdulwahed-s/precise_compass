name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  analyze-and-test:
    name: Format, analyze, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze (zero issues)
        run: dart analyze --fatal-infos --fatal-warnings lib test
      - name: Run tests with coverage
        run: flutter test --coverage
      - name: Enforce coverage gate on domain
        run: dart run tool/check_coverage.dart 90 lib/src/domain
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  publish-dry-run:
    name: Publish dry-run + pana
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Publish dry-run
        run: dart pub publish --dry-run
      - name: pana score
        run: |
          dart pub global activate pana
          dart pub global run pana --no-warning --exit-code-threshold 10 .

  build-example-android:
    name: Build example (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: example
      - run: flutter build apk --debug
        working-directory: example

  build-example-ios:
    name: Build example (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: example
      - run: flutter build ios --no-codesign --debug
        working-directory: example
